# Maintainability guardrails against dead/speculative public API
# (the "Theme 1" anti-pattern from the maintainability audit: accessors,
# `_dyn` variants, and getters with zero callers that needlessly expand the
# stable surface). These are `warn`, not `deny`, and are *opted into*
# per-crate via `[lints] workspace = true` so they do not flood the build
# with pre-existing noise across the whole workspace. Currently scoped to the
# hook/reborn crates.
#
# - `unreachable_pub`: flags `pub` items that are not reachable outside their
#   crate — the classic "this should be `pub(crate)`" smell.
# - `dead_code`: warn on never-used items (this is the rustc default, declared
#   here so it survives any future `#![allow(dead_code)]` creep at the crate root).
[workspace.lints.rust]
unreachable_pub = "warn"
dead_code = "warn"

[package]
name = "ironclaw"
version = "0.29.1"
edition = "2024"
rust-version = "1.92"
description = "Secure personal AI assistant that protects your data and expands its capabilities on the fly"
authors = ["NEAR AI <support@near.ai>"]
license = "MIT OR Apache-2.0"
homepage = "https://github.com/nearai/ironclaw"
repository = "https://github.com/nearai/ironclaw"

[package.metadata.wix]
upgrade-guid = "D0156E61-BA37-451E-8AB9-1A2ECCCFA48F"
path-guid = "F90B6EA6-87F7-499B-BB19-CF55DE1EB339"
license = false
eula = false

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-stream = { version = "0.1", features = ["sync"] }
tokio-util = { version = "0.7", features = ["compat"] }
futures = "0.3"
tokio-tungstenite = { version = "0.26", features = ["rustls-tls-native-roots"] }
eventsource-stream = "0.2"

# Agent Client Protocol (ACP) — standard communication with coding agents
agent-client-protocol = "0.10"

# HTTP client
reqwest = { version = "0.12", default-features = false, features = ["json", "multipart", "rustls-tls-native-roots", "stream"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Database - PostgreSQL (default, feature-gated)
deadpool-postgres = { version = "0.14", optional = true }
tokio-postgres = { version = "0.7", features = ["with-uuid-1", "with-chrono-0_4", "with-serde_json-1"], optional = true }
postgres-types = { version = "0.2", features = ["with-serde_json-1"], optional = true }
refinery = { version = "0.8", features = ["tokio-postgres"], optional = true }
tokio-postgres-rustls = { version = "0.13", optional = true }
rustls = { version = "0.23", optional = true, default-features = false }
rustls-native-certs = { version = "0.8", optional = true }
webpki-roots = { version = "0.26", optional = true }

# Database - libSQL/Turso (optional embedded database)
libsql = { version = "0.6", optional = true, default-features = false, features = ["core", "replication", "remote", "tls"] }

# Error handling
thiserror = "2"
anyhow = "1"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

# Configuration
dotenvy = "0.15"
toml = "0.8"

# Core types
uuid = { version = "1", features = ["v4", "v5", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
chrono-tz = "0.10"
iana-time-zone = "0.1"
rust_decimal = { version = "1", features = ["serde", "serde-with-str", "maths"] }
rust_decimal_macros = "1"

# Async traits
async-trait = "0.1"

# CLI
clap = { version = "4", features = ["derive", "env"] }

# Terminal
crossterm = "0.29"
rustyline = { version = "17", features = ["custom-bindings", "derive", "with-file-history"] }
termimad = "0.34"

# Channel integrations
axum = { version = "0.8", features = ["ws"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["trace", "cors", "set-header", "catch-panic"] }

# Cron scheduling for routines
cron = "0.13"

# JSON Schema validation (workspace document metadata).
# default-features disabled to avoid pulling a second `reqwest` major version
# for remote $ref resolution (we only validate against in-memory schemas).
jsonschema = { version = "0.45", default-features = false }

# Shared types
ironclaw_common = { path = "crates/ironclaw_common", version = "0.4.2" }
ironclaw_extractors = { path = "crates/ironclaw_extractors", version = "0.1.0" }
ironclaw_host_api = { path = "crates/ironclaw_host_api", version = "0.1.0" }
ironclaw_loop_support = { path = "crates/ironclaw_loop_support", version = "0.1.0" }
ironclaw_memory = { path = "crates/ironclaw_memory", version = "0.1.0" }
ironclaw_resources = { path = "crates/ironclaw_resources", version = "0.1.0" }
ironclaw_runtime_policy = { path = "crates/ironclaw_runtime_policy", version = "0.1.0" }
ironclaw_turns = { path = "crates/ironclaw_turns", version = "0.1.0" }

# Safety/sanitization
ironclaw_engine = { path = "crates/ironclaw_engine", version = "0.1.0" }
ironclaw_gateway = { path = "crates/ironclaw_gateway", version = "0.1.0" }
ironclaw_llm = { path = "crates/ironclaw_llm", version = "0.1.0" }
ironclaw_embeddings = { path = "crates/ironclaw_embeddings", version = "0.1.0" }
ironclaw_oauth = { path = "crates/ironclaw_oauth", version = "0.1.0" }
ironclaw_reborn_traces = { path = "crates/ironclaw_reborn_traces", version = "0.1.0" }
ironclaw_safety = { path = "crates/ironclaw_safety", version = "0.2.2" }
ironclaw_skills = { path = "crates/ironclaw_skills", version = "0.3.0" }
ironclaw_tui = { path = "crates/ironclaw_tui", optional = true, version = "0.1.0" }
regex = "1"
aho-corasick = "1"

# YAML parsing for SKILL.md frontmatter
serde_yml = "0.0.12"

# Filesystem paths
dirs = "6"
fs4 = "0.6"
glob = "0.3"

# Semantic versioning
semver = "1"

# Secrecy for sensitive values
secrecy = { version = "0.10", features = ["serde"] }

# URL parsing and encoding
url = "2"
urlencoding = "2"

# Open URLs in browser
open = "5"

# Vector embeddings for semantic search
# The postgres feature provides ToSql/FromSql for postgres-types (shared by tokio-postgres)
pgvector = { version = "0.4", features = ["postgres"], optional = true }

# WASM sandbox for untrusted tool execution.
# Floor 44.0.3: minimum patch containing the fix for RUSTSEC-2026-0182
# (leak in the WASIp1 `fd_renumber` implementation). Also retains the
# fix for RUSTSEC-2026-0149 (path_open(TRUNCATE) bypassing
# FilePerms::WRITE), first available in 44.0.2; 43.x is end-of-life for
# these advisories.
wasmtime = { version = "44.0.3", features = ["component-model"] }
wasmtime-wasi = "44.0.3"  # WASI support for component model
wasmparser = "0.246.2"  # WASM binary parsing for validation

# Cryptography for secrets management
aes = "0.8"
aes-gcm = "0.10"
hkdf = "0.12"
hmac = "0.12"
md-5 = "0.10"
sha2 = "0.10"
blake3 = "1"
rand = "0.8"
subtle = "2"  # Constant-time comparisons for token validation

# Multi-provider LLM support
rig-core = { version = "0.30", default-features = false, features = ["reqwest-rustls"] }

# AWS Bedrock: deps now live in `ironclaw_llm` (LLM provider) and
# `ironclaw_embeddings` (Titan embeddings); the top-level `bedrock` feature
# (below) re-exposes both via crate-feature forwarding.

# Docker sandbox
bollard = "0.18"

# Archive extraction for WASM extension bundles
flate2 = "1"
tar = "0.4"

# Document text extraction lives in `crates/ironclaw_extractors` (pdf-extract,
# etc.); `zip` is kept here because `src/tools/builtin/skill_tools.rs` uses it.
zip = { version = "2", default-features = false, features = ["deflate"] }

# HTTP proxy for sandboxed network access
hyper = { version = "1.5", features = ["server", "http1", "http2"] }
hyper-util = { version = "0.1", features = ["server", "tokio", "http1", "http2"] }
http-body-util = "0.1"
bytes = "1"
base64 = "0.22.1"
cookie = "0.18"
jsonwebtoken = "9"
mime_guess = "2.0.5"
clap_complete = "4.5.0"
lru = "0.16.3"

# HTML to Markdown conversion (feature gated)
html-to-markdown-rs = { version = "2.3", optional = true }
readabilityrs = { version = "0.1.2", optional = true }
ed25519-dalek = { version = "2.2.0", features = ["std"] }
bs58 = "0.5"
hex = "0.4.3"

# OpenClaw import (feature gated)
json5 = { version = "0.4", optional = true }

# macOS keychain
[target.'cfg(target_os = "macos")'.dependencies]
security-framework = "3"

# PTY allocation for Claude CLI stdout buffering fix (Unix only)
[target.'cfg(unix)'.dependencies]
pty-process = { version = "0.5", features = ["async"] }

# Linux secret-service (GNOME Keyring, KWallet)
[target.'cfg(target_os = "linux")'.dependencies]
secret-service = { version = "4", features = ["rt-tokio-crypto-rust"] }
zbus = "4"

[build-dependencies]
serde_json = "1"

[dev-dependencies]
tokio-test = "0.4"
tracing-test = "0.2"
testcontainers-modules = { version = "0.11", features = ["postgres"] }
pretty_assertions = "1"
tempfile = "3"
insta = { version = "1.46.3", features = ["yaml"] }
# Pull the LLM crate's `testing` feature in only for tests so `StubLlm` and
# fault-injection helpers don't ship in release binaries.
ironclaw_llm = { path = "crates/ironclaw_llm", version = "0.1.0", features = ["testing"] }
ironclaw_auth = { path = "crates/ironclaw_auth", version = "0.1.0" }
ironclaw_approvals = { path = "crates/ironclaw_approvals", version = "0.1.0" }
ironclaw_authorization = { path = "crates/ironclaw_authorization", version = "0.1.0" }
ironclaw_extensions = { path = "crates/ironclaw_extensions", version = "0.1.0" }
ironclaw_filesystem = { path = "crates/ironclaw_filesystem", version = "0.1.0" }
ironclaw_first_party_extensions = { path = "crates/ironclaw_first_party_extensions", version = "0.1.0" }
ironclaw_host_runtime = { path = "crates/ironclaw_host_runtime", version = "0.1.0" }
ironclaw_network = { path = "crates/ironclaw_network", version = "0.1.0" }
ironclaw_processes = { path = "crates/ironclaw_processes", version = "0.1.0" }
ironclaw_resources = { path = "crates/ironclaw_resources", version = "0.1.0" }
ironclaw_secrets = { path = "crates/ironclaw_secrets", version = "0.1.0" }
ironclaw_product_adapters = { path = "crates/ironclaw_product_adapters", version = "0.1.0", features = ["test-support"] }
ironclaw_product_workflow = { path = "crates/ironclaw_product_workflow", version = "0.1.0", features = ["test-support"] }
ironclaw_reborn = { path = "crates/ironclaw_reborn", version = "0.1.0", features = ["root-llm-provider"] }
ironclaw_reborn_composition = { path = "crates/ironclaw_reborn_composition", version = "0.1.0", features = ["test-support"] }
ironclaw_reborn_config = { path = "crates/ironclaw_reborn_config", version = "0.1.0" }
ironclaw_run_state = { path = "crates/ironclaw_run_state", version = "0.1.0" }
ironclaw_threads = { path = "crates/ironclaw_threads", version = "0.1.0" }
ironclaw_triggers = { path = "crates/ironclaw_triggers", version = "0.1.0" }
ironclaw_trust = { path = "crates/ironclaw_trust", version = "0.1.0" }
ironclaw_wasm = { path = "crates/ironclaw_wasm", version = "0.1.0" }
# Same idea for embeddings: `MockEmbeddings` is only reachable in dev builds.
ironclaw_embeddings = { path = "crates/ironclaw_embeddings", version = "0.1.0", features = ["testing"] }

[features]
default = ["postgres", "libsql", "html-to-markdown", "tui"]
postgres = [
    "dep:deadpool-postgres",
    "dep:tokio-postgres",
    "dep:tokio-postgres-rustls",
    "dep:rustls",
    "dep:rustls-native-certs",
    "dep:webpki-roots",
    "dep:postgres-types",
    "dep:refinery",
    "dep:pgvector",
    "rust_decimal/db-tokio-postgres",
]
libsql = ["dep:libsql"]
# Opt-in feature for especially heavy integration-test targets that run in a
# dedicated CI job instead of the default Rust test matrix.
integration = []
# Replay-gate snapshot tests promoted out of `--ignored` into a dedicated CI
# job. Enabled by `.github/workflows/replay-gate.yml`; implies `libsql` so the
# test rig can spin up its embedded database.
replay = ["libsql"]
html-to-markdown = ["dep:html-to-markdown-rs", "dep:readabilityrs"]
bedrock = ["ironclaw_llm/bedrock", "ironclaw_embeddings/bedrock"]
tui = ["dep:ironclaw_tui"]
import = ["dep:json5", "libsql"]
# Conditional gate for memory-substrate regression tests that anticipate
# specific guards: `ensure_path_matches_context`/`ensure_scope_matches_context`
# fail-closed checks, deterministic tie-breaking by path ascending,
# `.system/engine/orchestrator/*` protected-path registration, and
# min_score-after-normalization. #3180 as merged delivers the substrate
# skeleton but NOT these specific behaviors — the followup PR(s) that
# implement them must enable this feature in their merge commit so the
# gated tests fire in CI. Mirrors the same-named feature on
# `ironclaw_memory`.
#
# Empirical note (2026-05-12): enabling `pr3180-ready` on the current
# `reborn-integration` HEAD surfaces 7 gated tests as failing, because
# the anticipated APIs do not exist in the merged substrate yet. Do not
# enable in CI until the followup landings.
pr3180-ready = []
# Conditional gate for caller-tier (tool-dispatcher → substrate) tests.
# Distinct from `pr3180-ready` because the substrate-level guards and
# the tool-routing migration are separate landings: PR 7 routes
# `memory_write` through `ironclaw_memory`'s `PromptWriteSafetyPolicy`,
# so until PR 7 lands, tool-layer rejection tests run against the
# legacy host-workspace path which doesn't consult the substrate.
# PR 7 must enable this feature in its merge commit.
pr7-ready = []

[[test]]
name = "e2e_thread_scheduling"
required-features = ["libsql", "integration"]

[[test]]
name = "html_to_markdown"
required-features = ["html-to-markdown"]

[profile.release]
strip = true          # Remove debug symbols from release binaries

# The profile that 'cargo dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

# Config for 'dist'
[workspace.metadata.dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# Ignore out-of-date generated CI so custom release.yml jobs are allowed
allow-dirty = ["ci"]
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "powershell", "npm", "msi"]
# Publish jobs to run in CI
publish-jobs = []
# Target platforms to build apps for (Rust target-triple syntax)
targets = [
    "aarch64-apple-darwin",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "x86_64-pc-windows-msvc",
]
# The archive format to use for windows builds (defaults .zip)
windows-archive = ".tar.gz"
# The archive format to use for non-windows builds (defaults .tar.xz)
unix-archive = ".tar.gz"
# Which actions to run on pull requests
pr-run-mode = "skip"
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = true
# Cache intermediate build artifacts to speed up the release pipelines
cache-builds = true

[workspace.metadata.dist.github-custom-runners]
aarch64-unknown-linux-gnu = "ubuntu-24.04-arm"
aarch64-unknown-linux-musl = "ubuntu-24.04-arm"
x86_64-unknown-linux-gnu = "ubuntu-22.04"
x86_64-unknown-linux-musl = "ubuntu-22.04"
x86_64-pc-windows-msvc = "windows-2022"
x86_64-apple-darwin = "macos-15-intel"
aarch64-apple-darwin = "macos-14"
